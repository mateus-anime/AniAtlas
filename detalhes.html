<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AniAtlas - Onde assistir anime</title>

  <meta
    name="description"
    content="Veja sinopse, episódios, nota, trailer, personagens e onde assistir anime legalmente no AniAtlas."
  />
  <meta
    name="keywords"
    content="onde assistir anime, assistir anime legalmente, sinopse anime, personagens anime, trailer anime, AniAtlas"
  />
  <meta name="author" content="AniAtlas" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="AniAtlas - Onde assistir anime" />
  <meta
    property="og:description"
    content="Descubra sinopse, nota, trailer e onde assistir anime legalmente no AniAtlas."
  />
  <meta property="og:image" content="https://aniatlas.tewshenr.workers.dev/logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aniatlas.tewshenr.workers.dev/detalhes.html?id=1" />

  <link rel="canonical" href="https://aniatlas.tewshenr.workers.dev/detalhes.html?id=1" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #f1f5f9;
    }

    .banner {
      width: 100%;
      height: 260px;
      background: #111827 center/cover no-repeat;
      position: relative;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        #0b1020 0%,
        rgba(11, 16, 32, 0.4) 60%,
        rgba(11, 16, 32, 0.2) 100%
      );
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .top-actions {
      padding-top: 16px;
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back-btn,
    .lang-btn,
    .retry-btn {
      display: inline-block;
      background: #334155;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .retry-btn {
      background: #2563eb;
    }

    .hero {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      margin-top: -80px;
      position: relative;
      z-index: 2;
      align-items: start;
    }

    .cover {
      width: 100%;
      border-radius: 16px;
      border: 1px solid #1f2937;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      background: #111827;
    }

    .info-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.15;
    }

    .seo-subtitle {
      color: #93c5fd;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 14px;
    }

    .meta {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .genres {
      color: #93c5fd;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .desc {
      color: #e5e7eb;
      line-height: 1.8;
      white-space: pre-line;
    }

    .seo-text {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 14px;
      background: #0f172a;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .seo-text p {
      margin: 0;
    }

    .rights-box {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 14px;
      background: #0f172a;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .rights-box p {
      margin: 0 0 12px;
    }

    .rights-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .license-btn {
      background: #0ea5e9;
    }

    .read-btn {
      background: #16a34a;
    }

    .legal-btn {
      background: #f59e0b;
    }

    .warning-text {
      color: #fbbf24;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button,
    .watch-link,
    .action-link {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      color: white;
      display: inline-block;
    }

    .favorite-btn {
      background: #e11d48;
    }

    .watch-link {
      background: #2563eb;
    }

    .watch-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .watch-box p {
      margin: 0 0 14px;
    }

    .watch-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .watch-actions a {
      text-decoration: none;
    }

    .watch-tip {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    .ad-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px dashed #334155;
      border-radius: 16px;
      background: #0f172a;
      color: #94a3b8;
      text-align: center;
      font-size: 14px;
    }

    .section {
      margin-top: 28px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }

    .card-body {
      padding: 12px;
    }

    .card-title {
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card-sub {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.5;
    }

    .trailer-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      overflow: hidden;
    }

    .trailer-box iframe {
      width: 100%;
      height: 420px;
      border: 0;
      display: block;
    }

    .loading,
    .error,
    .empty {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 16px;
      color: #94a3b8;
    }

    .error-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
        margin-top: -50px;
      }

      .cover {
        max-width: 260px;
      }

      h1 {
        font-size: 28px;
      }

      .trailer-box iframe {
        height: 240px;
      }
    }
  </style>
</head>
<body>
  <div id="banner" class="banner">
    <div class="banner-overlay"></div>
  </div>

  <div class="page">
    <div class="top-actions">
      <a class="back-btn" href="index.html" id="backBtn">← Voltar</a>
      <button class="lang-btn" onclick="trocarIdioma()">🌎 PT/EN</button>
    </div>

    <div id="content" class="loading">Carregando detalhes do anime...</div>
  </div>

  <script>
    const API_URL = "https://graphql.anilist.co";
    const FAVORITES_KEY = "animehub_favorites";
    const LANG_KEY = "aniatlas_lang";
    const SITE_URL = "https://aniatlas.tewshenr.workers.dev";

    let idioma = localStorage.getItem(LANG_KEY) || "pt";

    const MANGA_RIGHTS_DB = {
      "naruto": {
        canReadOnSite: false,
        readerUrl: "",
        licenseType: "Leitura não autorizada no AniAtlas",
        licenseLabel: "",
        licenseUrl: "",
        officialReadUrl: "https://www.google.com/search?q=Naruto+manga+ler+legalmente"
      }
    };

    function t(pt, en) {
      return idioma === "pt" ? pt : en;
    }

    function atualizarMetaDescricao(texto) {
      const meta = document.querySelector('meta[name="description"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarMetaKeywords(texto) {
      const meta = document.querySelector('meta[name="keywords"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgTitulo(texto) {
      const meta = document.querySelector('meta[property="og:title"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgDescricao(texto) {
      const meta = document.querySelector('meta[property="og:description"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgImagem(url) {
      const meta = document.querySelector('meta[property="og:image"]');
      if (meta && url) {
        meta.setAttribute("content", url);
      }
    }

    function atualizarOgUrl(url) {
      const meta = document.querySelector('meta[property="og:url"]');
      if (meta) {
        meta.setAttribute("content", url);
      }
    }

    function atualizarCanonical(url) {
      const link = document.querySelector('link[rel="canonical"]');
      if (link) {
        link.setAttribute("href", url);
      }
    }

    function limparSchemaAnime() {
      const antigo = document.getElementById("anime-schema-jsonld");
      if (antigo) {
        antigo.remove();
      }
    }

    function adicionarSchemaAnime(media, tituloPagina, descricaoLimpa, urlCanonica) {
      limparSchemaAnime();

      const imageUrl =
        media.coverImage?.extraLarge ||
        media.coverImage?.large ||
        `${SITE_URL}/logo.png`;

      const schema = {
        "@context": "https://schema.org",
        "@type": "TVSeries",
        "name": tituloPagina,
        "url": urlCanonica,
        "image": imageUrl,
        "description": descricaoLimpa || t("Descrição não disponível.", "Description not available."),
        "genre": media.genres || [],
        "inLanguage": idioma === "pt" ? "pt-BR" : "en",
        "aggregateRating": media.averageScore
          ? {
              "@type": "AggregateRating",
              "ratingValue": Number((media.averageScore / 10).toFixed(1)),
              "bestRating": 10,
              "worstRating": 0,
              "ratingCount": 1
            }
          : undefined
      };

      if (media.episodes) {
        schema.numberOfEpisodes = media.episodes;
      }

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "anime-schema-jsonld";
      script.textContent = JSON.stringify(schema);

      document.head.appendChild(script);
    }
    
    
    function trocarIdioma() {
      idioma = idioma === "pt" ? "en" : "pt";
      localStorage.setItem(LANG_KEY, idioma);
      carregarDetalhes();
    }

    function traduzirGenero(genero) {
      const mapa = {
        "Action": "Ação",
        "Adventure": "Aventura",
        "Comedy": "Comédia",
        "Drama": "Drama",
        "Fantasy": "Fantasia",
        "Horror": "Terror",
        "Romance": "Romance",
        "Sci-Fi": "Ficção científica",
        "Sports": "Esporte",
        "Mystery": "Mistério",
        "Slice of Life": "Slice of Life"
      };

      if (idioma === "en") return genero;
      return mapa[genero] || genero;
    }

    function traduzirStatus(status) {
      if (idioma === "en") return status || "?";

      const mapa = {
        "FINISHED": "Finalizado",
        "RELEASING": "Em lançamento",
        "NOT_YET_RELEASED": "Ainda não lançado",
        "CANCELLED": "Cancelado",
        "HIATUS": "Em pausa"
      };

      return mapa[status] || status || "?";
    }

    function traduzirFormato(formato) {
      if (idioma === "en") return formato || "?";

      const mapa = {
        "TV": "TV",
        "TV_SHORT": "TV Curta",
        "MOVIE": "Filme",
        "SPECIAL": "Especial",
        "OVA": "OVA",
        "ONA": "ONA",
        "MUSIC": "Música"
      };

      return mapa[formato] || formato || "?";
    }

    function traduzirTemporada(season) {
      if (idioma === "en") return season || "?";

      const mapa = {
        "WINTER": "Inverno",
        "SPRING": "Primavera",
        "SUMMER": "Verão",
        "FALL": "Outono"
      };

      return mapa[season] || season || "?";
    }

    function traduzirSource(source) {
      if (idioma === "en") return source || "?";

      const mapa = {
        "ORIGINAL": "Original",
        "MANGA": "Mangá",
        "LIGHT_NOVEL": "Light Novel",
        "VISUAL_NOVEL": "Visual Novel",
        "VIDEO_GAME": "Jogo",
        "OTHER": "Outro",
        "NOVEL": "Novel",
        "WEB_NOVEL": "Web Novel",
        "BOOK": "Livro"
      };

      return mapa[source] || source || "?";
    }

    function criarSlug(texto) {
      return (texto || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    }

    function getAnimeIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getAnimeSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || "";
    }

    function getRightsData(title, source) {
      const slug = criarSlug(title);
      const isMangaBased = source === "MANGA" || source === "LIGHT_NOVEL" || source === "WEB_NOVEL" || source === "NOVEL" || source === "BOOK";

      const fallbackOfficialReadUrl = `https://www.google.com/search?q=${encodeURIComponent(title + " manga ler legalmente")}`;
      const found = MANGA_RIGHTS_DB[slug];

      if (found) {
        return {
          ...found,
          title,
          slug
        };
      }

      return {
        canReadOnSite: false,
        readerUrl: "",
        licenseType: isMangaBased
          ? t("Leitura não autorizada no AniAtlas", "Reading not authorized on AniAtlas")
          : t("Obra sem leitor interno no AniAtlas", "Work without internal reader on AniAtlas"),
        licenseLabel: "",
        licenseUrl: "",
        officialReadUrl: fallbackOfficialReadUrl,
        title,
        slug
      };
    }

    function renderRightsBox(rightsData) {
      if (rightsData.canReadOnSite) {
        return `
          <div class="rights-box">
            <p>
              ${t(
                `Esta obra possui leitura autorizada no AniAtlas.`,
                `This work has authorized reading on AniAtlas.`
              )}
            </p>

            <div class="rights-actions">
              <a class="action-link read-btn" href="${rightsData.readerUrl}">
                ${t("📖 Ler mangá", "📖 Read manga")}
              </a>

              ${
                rightsData.licenseUrl
                  ? `<a class="action-link license-btn" href="${rightsData.licenseUrl}" target="_blank" rel="noopener">
                      ${rightsData.licenseLabel || t("📄 Ver autorização", "📄 View authorization")}
                    </a>`
                  : ""
              }
            </div>

            <div class="watch-tip">
              ${rightsData.licenseType || t("Autorização registrada.", "Authorization registered.")}
            </div>
          </div>
        `;
      }

      return `
        <div class="rights-box">
          <p class="warning-text">
            ${t(
              `O AniAtlas não hospeda a leitura desta obra no site porque não possui autorização para exibi-la aqui.`,
              `AniAtlas does not host the reading of this work on the site because it does not have authorization to display it here.`
            )}
          </p>

          <div class="rights-actions">
            <a class="action-link legal-btn" href="${rightsData.officialReadUrl}" target="_blank" rel="noopener">
              ${t("📖 Ler legalmente", "📖 Read legally")}
            </a>

            ${
              rightsData.licenseUrl
                ? `<a class="action-link license-btn" href="${rightsData.licenseUrl}" target="_blank" rel="noopener">
                    ${rightsData.licenseLabel || t("📄 Ver informações de licença", "📄 View license information")}
                  </a>`
                : ""
            }
          </div>

          <div class="watch-tip">
            ${rightsData.licenseType || t("Sem autorização de leitura local.", "No local reading authorization.")}
          </div>
        </div>
      `;
    }

    async function fetchAniList(query, variables = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ query, variables }),
          signal: controller.signal
        });

        return await response.json();
      } finally {
        clearTimeout(timeout);
      }
    }

    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveFavorites(favorites) {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    }

    function isFavorite(id) {
      return getFavorites().some(item => item.id === id);
    }

    function toggleFavorite(anime) {
      const favorites = getFavorites();
      const exists = favorites.some(item => item.id === anime.id);

      let updatedFavorites;

      if (exists) {
        updatedFavorites = favorites.filter(item => item.id !== anime.id);
      } else {
        updatedFavorites = [anime, ...favorites];
      }

      saveFavorites(updatedFavorites);
      atualizarBotaoFavorito(anime.id);
    }

    function atualizarBotaoFavorito(id) {
      const btn = document.getElementById("favoriteBtn");
      if (!btn) return;
      btn.textContent = isFavorite(id)
        ? t("Remover dos favoritos", "Remove from favorites")
        : t("Favoritar", "Favorite");
    }

    function limparTexto(texto) {
      if (!texto) return t("Descrição não disponível.", "Description not available.");
      return texto.replace(/<[^>]*>/g, "").trim();
    }

    function animeFavoritoData(media) {
      return {
        id: media.id,
        title:
          media.title?.english ||
          media.title?.romaji ||
          media.title?.native ||
          t("Sem título", "Untitled"),
        episodes: media.episodes ?? "?",
        averageScore: media.averageScore ?? "?",
        genres: media.genres || [],
        image: media.coverImage?.large || "",
        siteUrl: media.siteUrl || "#"
      };
    }
    
    
    
    function criarPersonagens(lista) {
      if (!lista?.length) {
        return `<div class="empty">${t("Nenhum personagem encontrado.", "No characters found.")}</div>`;
      }

      return `
        <div class="grid">
          ${lista.map(item => `
            <div class="card">
              <img
                src="${item.node?.image?.large || ""}"
                alt="${item.node?.name?.full || t("Personagem", "Character")}"
                loading="lazy"
              >
              <div class="card-body">
                <div class="card-title">${item.node?.name?.full || t("Sem nome", "No name")}</div>
                <div class="card-sub">${item.role || "?"}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function criarRecomendacoes(lista) {
      const filtrada = (lista || [])
        .map(item => item.mediaRecommendation)
        .filter(Boolean)
        .slice(0, 8);

      if (!filtrada.length) {
        return `<div class="empty">${t("Nenhuma recomendação encontrada.", "No recommendations found.")}</div>`;
      }

      return `
        <div class="grid">
          ${filtrada.map(anime => {
            const animeTitle =
              anime.title?.english ||
              anime.title?.romaji ||
              anime.title?.native ||
              t("Sem título", "Untitled");
            const animeSlug = criarSlug(animeTitle);
            const animeUrl = `detalhes.html?slug=${animeSlug}&id=${anime.id}`;

            return `
              <a href="${animeUrl}" style="text-decoration:none; color:inherit;">
                <div class="card">
                  <img
                    src="${anime.coverImage?.large || ""}"
                    alt="${animeTitle}"
                    loading="lazy"
                  >
                  <div class="card-body">
                    <div class="card-title">${animeTitle}</div>
                    <div class="card-sub">${t("Nota", "Score")}: ${anime.averageScore ?? "?"}</div>
                  </div>
                </div>
              </a>
            `;
          }).join("")}
        </div>
      `;
    }

    function criarTrailer(trailer) {
      if (!trailer?.id || trailer.site !== "youtube") {
        return `<div class="empty">${t("Trailer não disponível.", "Trailer not available.")}</div>`;
      }

      return `
        <div class="trailer-box">
          <iframe
            src="https://www.youtube.com/embed/${trailer.id}"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
      `;
    }

    function criarOndeAssistir(animeTitle) {
      const buscaLegal = encodeURIComponent(
        `${animeTitle} ${t("onde assistir legalmente", "where to watch legally")}`
      );

      const buscaCrunchyroll = encodeURIComponent(`${animeTitle} Crunchyroll`);
      const buscaNetflix = encodeURIComponent(`${animeTitle} Netflix`);
      const buscaPrime = encodeURIComponent(`${animeTitle} Prime Video`);

      return `
        <div class="watch-box">
          <p>
            ${t(
              `Quer saber onde assistir ${animeTitle} legalmente? Use os botões abaixo para procurar em serviços oficiais e descobrir onde o anime pode estar disponível.`,
              `Want to know where to watch ${animeTitle} legally? Use the buttons below to search official services and find where the anime may be available.`
            )}
          </p>

          <div class="watch-actions">
            <a class="watch-link" href="https://www.google.com/search?q=${buscaLegal}" target="_blank" rel="noopener">
              ${t("🔎 Procurar onde assistir", "🔎 Search where to watch")}
            </a>

            <a class="back-btn" href="https://www.google.com/search?q=${buscaCrunchyroll}" target="_blank" rel="noopener">
              Crunchyroll
            </a>

            <a class="back-btn" href="https://www.google.com/search?q=${buscaNetflix}" target="_blank" rel="noopener">
              Netflix
            </a>

            <a class="back-btn" href="https://www.google.com/search?q=${buscaPrime}" target="_blank" rel="noopener">
              Prime Video
            </a>
          </div>

          <div class="watch-tip">
            ${t(
              "Dica: a disponibilidade pode mudar conforme o país e o catálogo do streaming.",
              "Tip: availability may change depending on your country and the streaming catalog."
            )}
          </div>
        </div>
      `;
    }

    function mostrarErroDetalhes(mensagem) {
      const content = document.getElementById("content");
      content.className = "error";
      content.innerHTML = `
        <div>${mensagem}</div>
        <div class="error-actions">
          <button class="retry-btn" onclick="carregarDetalhes()">${t("Tentar novamente", "Try again")}</button>
          <a class="back-btn" href="index.html">${t("← Voltar", "← Back")}</a>
        </div>
      `;
    }

    async function carregarDetalhes() {
      const id = getAnimeIdFromUrl();
      const slugAtual = getAnimeSlugFromUrl();
      const content = document.getElementById("content");
      document.documentElement.lang = idioma === "pt" ? "pt-BR" : "en";
      document.getElementById("backBtn").textContent = t("← Voltar", "← Back");

      if (!id) {
        mostrarErroDetalhes(t("ID do anime não encontrado.", "Anime ID not found."));
        return;
      }

      content.className = "loading";
      content.textContent = t("Carregando detalhes do anime...", "Loading anime details...");

      const query = `
        query ($id: Int) {
          Media(id: $id, type: ANIME) {
            id
            title {
              romaji
              english
              native
            }
            description(asHtml: false)
            episodes
            averageScore
            genres
            status
            format
            season
            seasonYear
            duration
            source
            bannerImage
            siteUrl
            trailer {
              id
              site
            }
            coverImage {
              large
              extraLarge
            }
            characters(sort: ROLE, page: 1, perPage: 12) {
              edges {
                role
                node {
                  id
                  name {
                    full
                  }
                  image {
                    large
                  }
                }
              }
            }
            recommendations(page: 1, perPage: 8, sort: RATING_DESC) {
              nodes {
                mediaRecommendation {
                  id
                  title {
                    romaji
                    english
                    native
                  }
                  averageScore
                  coverImage {
                    large
                  }
                }
              }
            }
          }
        }
      `;

      try {
        const data = await fetchAniList(query, { id: Number(id) });
        const media = data?.data?.Media;

        if (!media) {
          mostrarErroDetalhes(t("Anime não encontrado.", "Anime not found."));
          return;
        }

        const tituloPagina =
          media.title?.english ||
          media.title?.romaji ||
          media.title?.native ||
          "Anime";

        const slugCorreto = criarSlug(tituloPagina);
        const descricaoLimpa = limparTexto(media.description);
        const descricaoCurta = descricaoLimpa.slice(0, 155);

        const tituloSeo = t(
          `Onde assistir ${tituloPagina}, sinopse e detalhes | AniAtlas`,
          `Where to watch ${tituloPagina}, synopsis and details | AniAtlas`
        );

        const descricaoSeo = t(
          `Veja sinopse, episódios, nota, trailer, personagens e onde assistir ${tituloPagina} legalmente no AniAtlas.`,
          `See synopsis, episodes, score, trailer, characters and where to watch ${tituloPagina} legally on AniAtlas.`
        );

        const urlCanonica = `${SITE_URL}/detalhes.html?slug=${slugCorreto}&id=${media.id}`;

        document.title = tituloSeo;
        atualizarMetaDescricao(descricaoCurta || descricaoSeo);
        atualizarMetaKeywords(
          `${tituloPagina}, ${t("onde assistir", "where to watch")}, anime, AniAtlas`
        );
        atualizarOgTitulo(tituloSeo);
        atualizarOgDescricao(descricaoCurta || descricaoSeo);
        atualizarOgImagem(media.coverImage?.extraLarge || media.coverImage?.large || `${SITE_URL}/logo.png`);
        atualizarOgUrl(urlCanonica);
        atualizarCanonical(urlCanonica);
        adicionarSchemaAnime(media, tituloPagina, descricaoLimpa, urlCanonica);

        if (slugCorreto && slugAtual !== slugCorreto) {
          window.history.replaceState({}, "", `detalhes.html?slug=${slugCorreto}&id=${media.id}`);
        }

        if (media.bannerImage) {
          const banner = new Image();
          banner.src = media.bannerImage;
          banner.onload = () => {
            document.getElementById("banner").style.backgroundImage = `url('${media.bannerImage}')`;
          };
        }

        const favoritoData = animeFavoritoData(media);
        const buscaLegal = encodeURIComponent(
          `${favoritoData.title} ${t("onde assistir legalmente", "where to watch legally")}`
        );
        const rightsData = getRightsData(favoritoData.title, media.source);
    
    
    
    content.className = "";
        content.innerHTML = `
          <div class="hero">
            <img
              class="cover"
              src="${media.coverImage?.extraLarge || media.coverImage?.large || ""}"
              alt="${favoritoData.title}"
              loading="lazy"
            >

            <div class="info-box">
              <h1>${favoritoData.title}</h1>

              <p class="seo-subtitle">
                ${t(
                  `Veja sinopse, trailer, personagens e onde assistir ${favoritoData.title} legalmente.`,
                  `See synopsis, trailer, characters and where to watch ${favoritoData.title} legally.`
                )}
              </p>

              <div class="meta">
                <strong>${t("Nota", "Score")}:</strong> ${media.averageScore ?? "?"}<br>
                <strong>${t("Episódios", "Episodes")}:</strong> ${media.episodes ?? "?"}<br>
                <strong>${t("Status", "Status")}:</strong> ${traduzirStatus(media.status)}<br>
                <strong>${t("Formato", "Format")}:</strong> ${traduzirFormato(media.format)}<br>
                <strong>${t("Temporada", "Season")}:</strong> ${traduzirTemporada(media.season)} ${media.seasonYear ?? ""}<br>
                <strong>${t("Duração", "Duration")}:</strong> ${media.duration ? media.duration + " min" : "?"}<br>
                <strong>${t("Origem", "Source")}:</strong> ${traduzirSource(media.source)}
              </div>

              <div class="genres">
                ${(media.genres || []).map(traduzirGenero).join(" • ")}
              </div>

              <div class="desc">
                ${descricaoLimpa}
              </div>

              <div class="seo-text">
                <p>
                  ${t(
                    `Quer saber onde assistir ${favoritoData.title} online? Aqui no AniAtlas você encontra informações sobre episódios, nota, trailer e onde o anime pode estar disponível legalmente em plataformas de streaming.`,
                    `Looking for where to watch ${favoritoData.title}? On AniAtlas you can find information about episodes, score, trailer and where the anime may be available legally on streaming platforms.`
                  )}
                </p>
              </div>

              ${renderRightsBox(rightsData)}

              <div class="actions">
                <button id="favoriteBtn" class="favorite-btn">${t("Favoritar", "Favorite")}</button>
                <a class="watch-link" href="https://www.google.com/search?q=${buscaLegal}" target="_blank" rel="noopener">
                  ${t("Onde assistir este anime", "Where to watch this anime")}
                </a>
              </div>

              <div class="ad-box">
                ${t("Espaço reservado para anúncio futuro", "Reserved space for future ad")}
              </div>
            </div>
          </div>

          <section class="section">
            <h2>${t("Onde assistir", "Where to watch")}</h2>
            ${criarOndeAssistir(favoritoData.title)}
          </section>

          <section class="section">
            <h2>${t("Mangá e licença", "Manga and license")}</h2>
            ${renderRightsBox(rightsData)}
          </section>

          <section class="section">
            <h2>${t("Trailer", "Trailer")}</h2>
            ${criarTrailer(media.trailer)}
          </section>

          <section class="section">
            <h2>${t("Personagens", "Characters")}</h2>
            ${criarPersonagens(media.characters?.edges)}
          </section>

          <section class="section">
            <h2>${t("Recomendações", "Recommendations")}</h2>
            ${criarRecomendacoes(media.recommendations?.nodes)}
          </section>
        `;

        document.getElementById("favoriteBtn").addEventListener("click", () => {
          toggleFavorite(favoritoData);
        });

        atualizarBotaoFavorito(media.id);
      } catch (error) {
        console.error(error);

        const mensagem =
          error.name === "AbortError"
            ? t(
                "Os detalhes demoraram demais para carregar. Tente novamente.",
                "Details took too long to load. Please try again."
              )
            : t(
                "Não foi possível carregar os detalhes agora.",
                "Could not load details right now."
              );

        mostrarErroDetalhes(mensagem);
      }
    }

    carregarDetalhes();
  </script>
</body>
</html>
