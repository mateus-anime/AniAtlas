<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AniAtlas - Favoritos</title>

  <meta
    name="description"
    content="Veja sua lista de animes favoritos salvos localmente no navegador no AniAtlas."
  />
  <meta
    name="keywords"
    content="anime, favoritos, animes favoritos, lista de animes, AniAtlas"
  />
  <meta name="author" content="AniAtlas" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="AniAtlas - Favoritos" />
  <meta
    property="og:description"
    content="Acesse sua página de favoritos e veja seus animes salvos no AniAtlas."
  />
  <meta property="og:image" content="https://aniatlas.tewshenr.workers.dev/logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aniatlas.tewshenr.workers.dev/favoritos.html" />

  <link rel="canonical" href="https://aniatlas.tewshenr.workers.dev/favoritos.html" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #f1f5f9;
    }

    header {
      background: linear-gradient(180deg, #111827, #0b1020);
      padding: 20px 16px 18px;
      border-bottom: 1px solid #1f2937;
    }

    .header-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .nav-btn,
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .lang-btn {
      background: #0f172a;
      border: 1px solid #334155;
    }

    .secondary-btn {
      background: #334155;
    }

    .remove-btn {
      background: #b91c1c;
    }

    .subtitle {
      margin: 0;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .section-title {
      font-size: 24px;
      margin: 0 0 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }

    .card-content {
      padding: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
      min-height: 38px;
      line-height: 1.25;
    }

    .card-meta {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .genres {
      font-size: 12px;
      color: #93c5fd;
      min-height: 32px;
      margin-bottom: 10px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-actions a {
      text-decoration: none;
    }

    .card-actions button {
      padding: 9px 12px;
      font-size: 12px;
      border-radius: 10px;
    }

    .empty {
      color: #94a3b8;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 16px;
    }

    @media (max-width: 600px) {
      .card img {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-wrap">
      <div class="top-buttons">
        <a href="index.html" class="nav-btn secondary-btn" id="backBtn">← Voltar para home</a>
        <button class="lang-btn" onclick="trocarIdioma()" id="langBtn">🌎 PT/EN</button>
      </div>

      <p class="subtitle" id="subtitleText">
        Seus animes favoritos salvos localmente no navegador
      </p>
    </div>
  </header>

  <main>
    <h1 class="section-title" id="titleText">⭐ Página de Favoritos</h1>
    <div id="favoritesList" class="cards"></div>
  </main>

  <script>
    const FAVORITES_KEY = "animehub_favorites";
    const LANG_KEY = "aniatlas_lang";
    const SITE_URL = "https://aniatlas.tewshenr.workers.dev";

    let idioma = localStorage.getItem(LANG_KEY) || "pt";

    function t(pt, en) {
      return idioma === "pt" ? pt : en;
    }

    function atualizarMetaDescricao(texto) {
      const meta = document.querySelector('meta[name="description"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgTitulo(texto) {
      const meta = document.querySelector('meta[property="og:title"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgDescricao(texto) {
      const meta = document.querySelector('meta[property="og:description"]');
      if (meta) {
        meta.setAttribute("content", texto);
      }
    }

    function atualizarOgUrl(url) {
      const meta = document.querySelector('meta[property="og:url"]');
      if (meta) {
        meta.setAttribute("content", url);
      }
    }

    function atualizarCanonical(url) {
      const link = document.querySelector('link[rel="canonical"]');
      if (link) {
        link.setAttribute("href", url);
      }
    }

    function removerSchemaFavoritos() {
      const antigo = document.getElementById("favorites-schema-jsonld");
      if (antigo) {
        antigo.remove();
      }
    }

    function adicionarSchemaFavoritos(titulo, descricao, url) {
      removerSchemaFavoritos();

      const schema = {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": titulo,
        "description": descricao,
        "url": url,
        "inLanguage": idioma === "pt" ? "pt-BR" : "en"
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "favorites-schema-jsonld";
      script.textContent = JSON.stringify(schema);

      document.head.appendChild(script);
    }

    function trocarIdioma() {
      idioma = idioma === "pt" ? "en" : "pt";
      localStorage.setItem(LANG_KEY, idioma);
      aplicarIdioma();
      renderFavoritesPage();
    }

    function aplicarIdioma() {
      document.documentElement.lang = idioma === "pt" ? "pt-BR" : "en";

      const titulo = t("AniAtlas - Favoritos", "AniAtlas - Favorites");
      const descricao = t(
        "Veja sua lista de animes favoritos salvos localmente no navegador no AniAtlas.",
        "See your favorite anime list saved locally in the browser on AniAtlas."
      );
      const urlAtual = `${SITE_URL}/favoritos.html`;

      document.title = titulo;
      atualizarOgTitulo(titulo);
      atualizarOgDescricao(descricao);
      atualizarMetaDescricao(descricao);
      atualizarOgUrl(urlAtual);
      atualizarCanonical(urlAtual);
      adicionarSchemaFavoritos(titulo, descricao, urlAtual);

      document.getElementById("backBtn").textContent = t(
        "← Voltar para home",
        "← Back to home"
      );
      document.getElementById("subtitleText").textContent = t(
        "Seus animes favoritos salvos localmente no navegador",
        "Your favorite anime saved locally in the browser"
      );
      document.getElementById("titleText").textContent = t(
        "⭐ Página de Favoritos",
        "⭐ Favorites Page"
      );
    }
    
    
    function traduzirGenero(genero) {
      const mapa = {
        "Action": "Ação",
        "Adventure": "Aventura",
        "Comedy": "Comédia",
        "Drama": "Drama",
        "Fantasy": "Fantasia",
        "Horror": "Terror",
        "Romance": "Romance",
        "Sci-Fi": "Ficção científica",
        "Sports": "Esporte",
        "Mystery": "Mistério",
        "Slice of Life": "Slice of Life"
      };

      if (idioma === "en") return genero;
      return mapa[genero] || genero;
    }

    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveFavorites(favorites) {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    }

    function removeFavorite(id) {
      const favorites = getFavorites().filter(item => item.id !== id);
      saveFavorites(favorites);
      renderFavoritesPage();
    }

    function criarCardFavorito(anime) {
      const buscaLegal = encodeURIComponent(
        `${anime.title} ${t("assistir legalmente", "watch legally")}`
      );

      return `
        <div class="card">
          <img src="${anime.image}" alt="${anime.title}" loading="lazy">
          <div class="card-content">
            <div class="card-title">${anime.title}</div>
            <div class="card-meta">
              ${t("Episódios", "Episodes")}: ${anime.episodes}<br>
              ${t("Nota", "Score")}: ${anime.averageScore}
            </div>
            <div class="genres">${(anime.genres || [])
              .slice(0, 3)
              .map(traduzirGenero)
              .join(" • ")}</div>
            <div class="card-actions">
              <a href="detalhes.html?id=${anime.id}">
                <button class="secondary-btn">${t("Detalhes", "Details")}</button>
              </a>

              <a href="https://www.google.com/search?q=${buscaLegal}" target="_blank" rel="noopener">
                <button>${t("Onde assistir", "Where to watch")}</button>
              </a>

              <button class="remove-btn" onclick="removeFavorite(${anime.id})">${t("Remover", "Remove")}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderFavoritesPage() {
      const el = document.getElementById("favoritesList");
      const favorites = getFavorites();

      if (!favorites.length) {
        el.innerHTML = `<div class="empty">${t(
          "Você ainda não tem favoritos salvos.",
          "You do not have any saved favorites yet."
        )}</div>`;
        return;
      }

      el.innerHTML = favorites.map(criarCardFavorito).join("");
    }

    aplicarIdioma();
    renderFavoritesPage();
  </script>
</body>
</html>
