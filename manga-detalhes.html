<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AniAtlas - Detalhes do mangá</title>

  <meta
    name="description"
    content="Veja detalhes do mangá no AniAtlas, incluindo descrição, status, tags e link oficial externo."
  />
  <meta
    name="keywords"
    content="mangá, detalhes do mangá, AniAtlas, MangaDex"
  />
  <meta name="author" content="AniAtlas" />
  <meta name="robots" content="index, follow, max-image-preview:large" />

  <meta property="og:title" content="AniAtlas - Detalhes do mangá" />
  <meta
    property="og:description"
    content="Veja informações do mangá e abra a página oficial externa no AniAtlas."
  />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/manga-detalhes.html" />
  <meta property="og:site_name" content="AniAtlas" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AniAtlas - Detalhes do mangá" />
  <meta
    name="twitter:description"
    content="Veja informações do mangá e abra a página oficial externa no AniAtlas."
  />
  <meta name="twitter:image" content="/logo.png" />

  <link rel="canonical" href="/manga-detalhes.html" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #f1f5f9;
    }

    header {
      background: linear-gradient(180deg, #111827, #0b1020);
      padding: 20px 16px 18px;
      border-bottom: 1px solid #1f2937;
    }

    .header-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .nav-btn,
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .secondary-btn {
      background: #334155;
    }

    .lang-btn {
      background: #0f172a;
      border: 1px solid #334155;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 16px 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f8fafc;
      outline: none;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .breadcrumb {
      margin-bottom: 16px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
    }

    .breadcrumb a {
      color: #93c5fd;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .hero {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      align-items: start;
      margin-bottom: 28px;
    }

    .cover {
      width: 100%;
      border-radius: 16px;
      border: 1px solid #1f2937;
      background: #111827;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .info-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #94a3b8;
      line-height: 1.7;
    }

    .meta {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .tags {
      color: #93c5fd;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .tags a {
      color: #93c5fd;
      text-decoration: none;
    }

    .tags a:hover {
      text-decoration: underline;
    }

    .desc {
      color: #e5e7eb;
      line-height: 1.8;
      white-space: pre-line;
    }

    .seo-box,
    .notice-box,
    .section-box,
    .loading,
    .error,
    .empty {
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .seo-box,
    .section-box,
    .loading,
    .error,
    .empty {
      background: #111827;
      border: 1px solid #1f2937;
    }

    .notice-box {
      background: #0f172a;
      border: 1px solid #334155;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .section-box h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 22px;
    }

    .section-box p,
    .section-box li {
      color: #dbe4ee;
      line-height: 1.8;
    }

    .section-box ul {
      margin: 0;
      padding-left: 18px;
    }

    .section-box a {
      color: #93c5fd;
      text-decoration: none;
    }

    .section-box a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .open-btn {
      background: #16a34a;
    }

    .section-title {
      font-size: 24px;
      margin: 0 0 14px;
    }

    .back-to-top {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      display: none;
    }

    .back-to-top.show {
      display: inline-block;
    }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 16px 30px;
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .cover {
        max-width: 280px;
      }

      h1 {
        font-size: 27px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-wrap">
      <div class="top-actions">
        <a href="mangas.html" class="nav-btn secondary-btn" id="backBtn">← Voltar</a>
        <button class="lang-btn" onclick="trocarIdioma()" id="langBtn">🌎 PT/EN</button>
      </div>

      <div class="search-box">
        <input
          id="searchInput"
          type="text"
          placeholder="Pesquisar mangá, ex: Naruto"
          aria-label="Pesquisar mangá"
          onkeydown="if(event.key === 'Enter') pesquisarOutroManga()"
        />
        <button onclick="pesquisarOutroManga()" id="searchBtn">Buscar</button>
      </div>
    </div>
  </header>

  <main class="page">
    <nav class="breadcrumb" id="breadcrumb">
      <a href="index.html">Início</a> › <a href="mangas.html">Mangás</a> › <span id="breadcrumbCurrent">Detalhes</span>
    </nav>

    <article id="content" class="loading">Carregando detalhes do mangá...</article>
  </main>

  <footer id="footerText">
    Dados de catálogo exibidos com base em fontes públicas. Use links externos para leitura quando disponíveis.
  </footer>

  <button id="backToTopBtn" class="back-to-top" onclick="voltarAoTopo()">
    ⬆ Topo
  </button>

  <script>
    const API_URL = "/api/mangadex";
    const LANG_KEY = "aniatlas_lang";
    const SITE_URL = window.location.origin;

    let idioma = localStorage.getItem(LANG_KEY) || "pt";

    function t(pt, en) {
      return idioma === "pt" ? pt : en;
    }

    function atualizarMetaDescricao(texto) {
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", texto);
    }

    function atualizarMetaKeywords(texto) {
      const meta = document.querySelector('meta[name="keywords"]');
      if (meta) meta.setAttribute("content", texto);
    }

    function atualizarOgTitulo(texto) {
      const meta = document.querySelector('meta[property="og:title"]');
      if (meta) meta.setAttribute("content", texto);
      const twitter = document.querySelector('meta[name="twitter:title"]');
      if (twitter) twitter.setAttribute("content", texto);
    }

    function atualizarOgDescricao(texto) {
      const meta = document.querySelector('meta[property="og:description"]');
      if (meta) meta.setAttribute("content", texto);
      const twitter = document.querySelector('meta[name="twitter:description"]');
      if (twitter) twitter.setAttribute("content", texto);
    }

    function atualizarOgImagem(url) {
      const meta = document.querySelector('meta[property="og:image"]');
      if (meta) meta.setAttribute("content", url);
      const twitter = document.querySelector('meta[name="twitter:image"]');
      if (twitter) twitter.setAttribute("content", url);
    }

    function atualizarOgUrl(url) {
      const meta = document.querySelector('meta[property="og:url"]');
      if (meta) meta.setAttribute("content", url);
    }

    function atualizarCanonical(url) {
      const link = document.querySelector('link[rel="canonical"]');
      if (link) link.setAttribute("href", url);
    }

    function removerSchemaManga() {
      const antigo = document.getElementById("manga-details-schema-jsonld");
      if (antigo) antigo.remove();
    }

    function removerSchemaBreadcrumb() {
      const antigo = document.getElementById("breadcrumb-schema-jsonld");
      if (antigo) antigo.remove();
    }

    function adicionarSchemaManga(titulo, descricao, url, imagem, tags, autores) {
      removerSchemaManga();

      const schema = {
        "@context": "https://schema.org",
        "@type": "Book",
        "name": titulo,
        "description": descricao,
        "url": url,
        "image": imagem,
        "genre": tags || [],
        "author": (autores || []).map(nome => ({
          "@type": "Person",
          "name": nome
        })),
        "inLanguage": idioma === "pt" ? "pt-BR" : "en"
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "manga-details-schema-jsonld";
      script.textContent = JSON.stringify(schema);

      document.head.appendChild(script);
    }

    function adicionarSchemaBreadcrumb(titulo, urlAtual) {
      removerSchemaBreadcrumb();

      const schema = {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": idioma === "pt" ? "Início" : "Home",
            "item": `${SITE_URL}/index.html`
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": idioma === "pt" ? "Mangás" : "Manga",
            "item": `${SITE_URL}/mangas.html`
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": titulo,
            "item": urlAtual
          }
        ]
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "breadcrumb-schema-jsonld";
      script.textContent = JSON.stringify(schema);

      document.head.appendChild(script);
    }

    function limparTexto(texto) {
      if (!texto) {
        return t("Descrição não disponível.", "Description not available.");
      }

      let limpo = texto;
      limpo = limpo.replace(/<[^>]*>/g, "");
      limpo = limpo.replace(/\[([^\]]+)\]\(([^)]+)\)/g, "$1");
      limpo = limpo.replace(/https?:\/\/\S+/g, "");
      limpo = limpo.replace(/^[\s>*|()[\]_\-]+$/gm, "");
      limpo = limpo.replace(/^[>\-]\s*/gm, "");
      limpo = limpo.replace(/\n{3,}/g, "\n\n");

      return limpo.trim();
    }

    function resumirDescricao(texto, limite = 160) {
      if (!texto) return "";
      const limpo = texto.replace(/\s+/g, " ").trim();
      if (limpo.length <= limite) return limpo;
      return `${limpo.slice(0, limite).trim()}...`;
    }

    function criarSlug(texto) {
      return (texto || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    }

    function getMangaIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getMangaSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || "";
    }

    function obterTituloManga(manga) {
      return (
        manga.attributes?.title?.en ||
        Object.values(manga.attributes?.title || {})[0] ||
        t("Sem título", "Untitled")
      );
    }

    function obterDescricaoManga(manga) {
      const desc =
        manga.attributes?.description?.["pt-br"] ||
        manga.attributes?.description?.en ||
        Object.values(manga.attributes?.description || {})[0] ||
        "";
      return limparTexto(desc);
    }

    function obterStatusManga(status) {
      const mapa = {
        ongoing: t("Em andamento", "Ongoing"),
        completed: t("Completo", "Completed"),
        hiatus: t("Em hiato", "Hiatus"),
        cancelled: t("Cancelado", "Cancelled")
      };
      return mapa[status] || status || "?";
    }

    function obterTags(manga) {
      return (manga.attributes?.tags || [])
        .map(tag => tag.attributes?.name?.en)
        .filter(Boolean);
    }

    function obterCoverFileName(manga) {
      const rel = (manga.relationships || []).find(item => item.type === "cover_art");
      return rel?.attributes?.fileName || "";
    }

    function obterCoverUrl(manga) {
      const fileName = obterCoverFileName(manga);

      if (!fileName) {
        return "logo.png";
      }

      const nome = fileName.toLowerCase();

      if (
        nome.includes("placeholder") ||
        nome.includes("default") ||
        nome.includes("cover_not_found") ||
        nome.includes("notfound")
      ) {
        return "logo.png";
      }

      return `https://uploads.mangadex.org/covers/${manga.id}/${fileName}.512.jpg`;
    }

    function verificarCapaDetalhes(img) {
      if (!img || !img.naturalWidth || !img.naturalHeight) return;

      const largura = img.naturalWidth;
      const altura = img.naturalHeight;
      const proporcao = largura / altura;
      const src = (img.currentSrc || img.src || "").toLowerCase();

      const suspeitaPorNome =
        src.includes("placeholder") ||
        src.includes("cover_not_found") ||
        src.includes("notfound");

      const suspeitaPorFormato =
        largura >= 200 &&
        altura >= 200 &&
        proporcao > 0.7;

      if (suspeitaPorNome || suspeitaPorFormato) {
        img.onerror = null;
        img.src = "logo.png";
      }
    }

    async function fetchMangaById(id) {
      const params = new URLSearchParams();
      params.append("ids[]", id);
      params.append("limit", "1");
      params.append("includes[]", "cover_art");
      params.append("includes[]", "author");
      params.append("includes[]", "artist");

      const response = await fetch(`${API_URL}?${params.toString()}`, {
        headers: {
          Accept: "application/json"
        }
      });

      if (!response.ok) {
        throw new Error(`Erro HTTP ${response.status}`);
      }

      return response.json();
    }

    function obterAutores(manga) {
      const autores = (manga.relationships || [])
        .filter(item => item.type === "author" || item.type === "artist")
        .map(item => item.attributes?.name)
        .filter(Boolean);

      return [...new Set(autores)];
    }

    function gerarLinksTags(tags) {
      if (!tags.length) return t("Sem tags", "No tags");

      return tags
        .slice(0, 8)
        .map(tag => {
          const termo = encodeURIComponent(tag);
          return `<a href="mangas.html?busca=${termo}">${tag}</a>`;
        })
        .join(" • ");
    }
    
    function pesquisarOutroManga() {
      const termo = document.getElementById("searchInput").value.trim();
      if (!termo) return;
      window.location.href = `mangas.html?busca=${encodeURIComponent(termo)}`;
    }

    function trocarIdioma() {
      idioma = idioma === "pt" ? "en" : "pt";
      localStorage.setItem(LANG_KEY, idioma);
      carregarDetalhesManga();
    }

    function controlarBotaoTopo() {
      const btn = document.getElementById("backToTopBtn");
      if (window.scrollY > 300) {
        btn.classList.add("show");
      } else {
        btn.classList.remove("show");
      }
    }

    function voltarAoTopo() {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function mostrarErro(mensagem) {
      const content = document.getElementById("content");
      content.className = "error";
      content.innerHTML = `
        <div>${mensagem}</div>
        <div class="actions" style="margin-top:14px;">
          <a href="mangas.html" class="nav-btn secondary-btn">${t("← Voltar", "← Back")}</a>
        </div>
      `;
    }

    async function carregarDetalhesManga() {
      const id = getMangaIdFromUrl();
      const slugAtual = getMangaSlugFromUrl();
      const content = document.getElementById("content");

      document.documentElement.lang = idioma === "pt" ? "pt-BR" : "en";
      document.getElementById("backBtn").textContent = t("← Voltar", "← Back");
      document.getElementById("searchBtn").textContent = t("Buscar", "Search");
      document.getElementById("searchInput").placeholder = t(
        "Pesquisar mangá, ex: Naruto",
        "Search manga, e.g. Naruto"
      );
      document.getElementById("footerText").textContent = t(
        "Dados de catálogo exibidos com base em fontes públicas. Use links externos para leitura quando disponíveis.",
        "Catalog data displayed based on public sources. Use external links for reading when available."
      );
      document.getElementById("backToTopBtn").textContent = t("⬆ Topo", "⬆ Top");
      document.getElementById("breadcrumbCurrent").textContent = t("Detalhes", "Details");

      if (!id) {
        mostrarErro(t("ID do mangá não encontrado.", "Manga ID not found."));
        return;
      }

      content.className = "loading";
      content.textContent = t("Carregando detalhes do mangá...", "Loading manga details...");

      try {
        const data = await fetchMangaById(id);
        const manga = data?.data?.[0];

        if (!manga) {
          mostrarErro(t("Mangá não encontrado.", "Manga not found."));
          return;
        }

        const titulo = obterTituloManga(manga);
        const descricao = obterDescricaoManga(manga);
        const descricaoCurta = resumirDescricao(descricao, 155);
        const tags = obterTags(manga);
        const autores = obterAutores(manga);
        const slugCorreto = criarSlug(titulo);
        const imagem = obterCoverUrl(manga);
        const urlCanonica = `${SITE_URL}/manga-detalhes.html?slug=${slugCorreto}&id=${manga.id}`;
        const externalUrl = `https://mangadex.org/title/${manga.id}`;
        const buscaPorTitulo = `mangas.html?busca=${encodeURIComponent(titulo)}`;

        const tituloSeo = t(
          `${titulo} - sinopse, status e detalhes | AniAtlas`,
          `${titulo} - synopsis, status and details | AniAtlas`
        );

        const descricaoSeo = t(
          `Veja a sinopse, status, autores, tags e informações de ${titulo} no AniAtlas.`,
          `See the synopsis, status, authors, tags and information for ${titulo} on AniAtlas.`
        );

        document.title = tituloSeo;
        atualizarMetaDescricao(descricaoCurta || descricaoSeo);
        atualizarMetaKeywords(`${titulo}, mangá, manga, AniAtlas, MangaDex, ${tags.join(", ")}`);
        atualizarOgTitulo(tituloSeo);
        atualizarOgDescricao(descricaoCurta || descricaoSeo);
        atualizarOgImagem(imagem);
        atualizarOgUrl(urlCanonica);
        atualizarCanonical(urlCanonica);
        adicionarSchemaManga(titulo, descricaoCurta || descricaoSeo, urlCanonica, imagem, tags, autores);
        adicionarSchemaBreadcrumb(titulo, urlCanonica);

        document.getElementById("breadcrumbCurrent").textContent = titulo;

        if (slugCorreto && slugAtual !== slugCorreto) {
          window.history.replaceState({}, "", `manga-detalhes.html?slug=${slugCorreto}&id=${manga.id}`);
        }

        content.className = "";
        content.innerHTML = `
          <div class="hero">
            <img
              class="cover"
              src="${imagem}"
              alt="${titulo}"
              loading="lazy"
              referrerpolicy="no-referrer"
              onerror="this.onerror=null;this.src='logo.png';"
              onload="verificarCapaDetalhes(this)"
            >

            <div class="info-box">
              <h1>${titulo}</h1>
              <p class="subtitle">
                ${t(
                  "Veja informações do mangá, status, tags e abra a página oficial externa.",
                  "See manga information, status, tags and open the official external page."
                )}
              </p>

              <div class="meta">
                <strong>${t("Status", "Status")}:</strong> ${obterStatusManga(manga.attributes?.status)}<br>
                <strong>${t("Ano", "Year")}:</strong> ${manga.attributes?.year || "?"}<br>
                <strong>${t("Conteúdo", "Content")}:</strong> ${manga.attributes?.contentRating || "safe"}<br>
                <strong>${t("Autores", "Authors")}:</strong> ${autores.length ? autores.join(", ") : "?"}
              </div>

              <div class="tags">
                ${gerarLinksTags(tags)}
              </div>

              <div class="desc">
                ${descricao}
              </div>

              <div class="actions">
                <a href="${externalUrl}" target="_blank" rel="noopener">
                  <button class="open-btn">${t("Abrir no MangaDex", "Open on MangaDex")}</button>
                </a>

                <a href="${buscaPorTitulo}" class="nav-btn secondary-btn">
                  ${t("Ver mais resultados", "See more results")}
                </a>

                <a href="mangas.html" class="nav-btn secondary-btn">
                  ${t("Voltar para mangás", "Back to manga")}
                </a>
              </div>
            </div>
          </div>

          <section class="seo-box">
            ${t(
              `Nesta página você encontra informações sobre ${titulo}, incluindo descrição, autores, status e tags. Para leitura, use o botão de acesso externo oficial.`,
              `On this page you can find information about ${titulo}, including description, authors, status and tags. For reading, use the official external access button.`
            )}
          </section>

          <section class="section-box">
            <h2>${t("Resumo do mangá", "Manga summary")}</h2>
            <p>
              ${t(
                `${titulo} é um mangá listado no AniAtlas com informações de catálogo, sinopse, status de publicação e classificação de conteúdo. Esta página ajuda você a descobrir detalhes rápidos antes de abrir a fonte externa de leitura.`,
                `${titulo} is a manga listed on AniAtlas with catalog information, synopsis, publication status and content rating. This page helps you discover quick details before opening the external reading source.`
              )}
            </p>
          </section>

          <section class="section-box">
            <h2>${t("Explorar mais", "Explore more")}</h2>
            <ul>
              <li><a href="${buscaPorTitulo}">${t("Buscar este título no catálogo", "Search this title in the catalog")}</a></li>
              <li><a href="mangas.html">${t("Ver mais mangás", "See more manga")}</a></li>
              <li><a href="index.html">${t("Voltar para a página inicial", "Back to home page")}</a></li>
            </ul>
          </section>

          <section class="notice-box">
            ${t(
              "O AniAtlas não hospeda capítulos protegidos nesta página. Use o botão externo para acessar a fonte disponível.",
              "AniAtlas does not host protected chapters on this page. Use the external button to access the available source."
            )}
          </section>
        `;
      } catch (error) {
        console.error(error);

        mostrarErro(
          t(
            `Não foi possível carregar os detalhes do mangá agora. Erro: ${error.message}`,
            `Could not load manga details right now. Error: ${error.message}`
          )
        );
      }
    }

    window.addEventListener("scroll", controlarBotaoTopo);

    carregarDetalhesManga();
  </script>
</body>
</html>
